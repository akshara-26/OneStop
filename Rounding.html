<script>
function checkSimplify() {
    // List of correct simplified answers as strings
    const correctAnswers = ["10", "30", "30", "70", "40", "90", "90", "50", "70", "0"];

    for (let i = 1; i <= 10; i++) {
        let userAnswer = document.getElementById(`q${i}`).value.trim(); // remove spaces
        let resultP = document.getElementById(`result${i}`);

        // Check if answer matches correct number
        if (userAnswer === correctAnswers[i - 1]) {
            resultP.innerHTML = "✅ Correct!";
            resultP.style.color = "green";
            document.getElementById(`q${i}`).style.backgroundColor = "#c8e6c9"; // green input
        } else {
            resultP.innerHTML = "❌ Try again!";
            resultP.style.color = "red";
            document.getElementById(`q${i}`).style.backgroundColor = "#ffcdd2"; // red input
        }
    }
}
</script>
