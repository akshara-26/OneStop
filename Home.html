  <a href="StudentPage2.html" style="display:inline-block; padding:10px 20px; background-color:#d9ecf8; color:#476a63; text-decoration:none; border-radius:8px; font-weight:bold; margin-bottom:20px;">← Back to Student Subjects</a>

  <h1 style="color:#476a63;">Welcome to LearningMath</h1>
  <p>Enter your name and grade:</p>

  <input type="text" id="studentName" placeholder="e.g. Sarah 6D">
  <button onclick="goToSite()">Enter</button>

  <script>
    function goToSite() {
      const name = document.getElementById("studentName").value.trim();

      if (name === "") {
        alert("Please enter your name and grade!");
        return;
      }

      localStorage.setItem("student", name);
      window.location.href = "Welcome.html";
    }
  </script>

</body>
